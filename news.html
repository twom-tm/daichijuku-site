        .blog-hero {
            padding: 140px 0 60px;
            background: var(--color-bg);

        .category-btn {

            background: var(--color-white);
            color: var(--color-text);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;

            color: var(--color-white);
            border-color: var(--color-navy);
        }

        .blog-grid {

            grid-template-columns: repeat(3, 1fr);
            gap: 28px;
            padding: 80px 0;

        .blog-card {
            background: var(--color-white);
            border: 1px solid var(--color-border-light);
            border-radius: var(--radius-md);
            overflow: hidden;
            transition: all var(--duration) var(--ease);
            text-decoration: none;
            display: block;
            color: inherit;
        }

        .blog-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .blog-card-image {
            width: 100%;
            height: 180px;
            background: var(--color-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .blog-card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .blog-card-body {
            padding: 24px;
        }

        .blog-card-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .blog-card-date {
            font-family: var(--font-en);
            font-size: 0.75rem;
            color: var(--color-text-light);
        }

        .blog-card-category {
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--color-accent);
            background: var(--color-accent-light);
            padding: 2px 10px;
            border-radius: 20px;
            letter-spacing: 0.03em;

        .blog-card h2 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--color-navy);
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .blog-card p {
            font-size: 0.85rem;
            color: var(--color-text-muted);
            line-height: 1.7;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        @media (max-width: 768px) {
            .blog-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }

        @media (max-width: 1024px) and (min-width: 769px) {
            .blog-grid {

    <script>
        // ── Unified News Rendering & Category Logic ──
        document.addEventListener('DOMContentLoaded', () => {
            const BLOG_KEY = 'daichijuku_blog_posts';
            const grid = document.getElementById('blogGrid');
            const buttons = document.querySelectorAll('.category-btn');

            // 1. Fetch LocalStorage Posts (Activity Reports)
            function getPosts() {
                try {
                    return JSON.parse(localStorage.getItem(BLOG_KEY)) || [];
                } catch { return []; }
            }

            const posts = getPosts().sort((a, b) => new Date(b.date) - new Date(a.date));

            // 2. Append Dynamic Posts to the Grid
            if (posts.length > 0) {
                const dynamicHtml = posts.map((p, i) => `
                    <div class="blog-card fade-in article-item" data-category="activity" onclick="openPost('${p.id}')">
                        <div class="blog-card-image">
                            ${p.image ? `<img src="${p.image}" alt="${p.title}">` : `<img src="img/placeholder.jpg" alt="${p.title}" style="opacity: 0.2">`}
                        </div>
                        <div class="blog-card-body">
                            <div class="blog-card-meta">
                                <span class="blog-card-date">${p.date}</span>
                                <span class="blog-card-category" style="background:var(--color-navy);color:#fff;">活動報告</span>
                            </div>
                            <h2>${p.title}</h2>
                            <p>${p.excerpt || p.content.replace(/<[^>]*>/g, '').substring(0, 120) + '...'}</p>
                        </div>
                    </div>
                `).join('');
                grid.insertAdjacentHTML('beforeend', dynamicHtml);
            }

            // 3. Category Filter Logic (Applies to both static and dynamic items)
            const items = document.querySelectorAll('.article-item');

            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    buttons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');

                    const category = btn.getAttribute('data-category');

                    let visibleCount = 0;
                    items.forEach(item => {
                        const itemCategory = item.getAttribute('data-category');
                        if (category === 'all' || itemCategory === category) {
                            item.style.display = 'block';
                            item.classList.remove('is-visible');
                            setTimeout(() => item.classList.add('is-visible'), 50);
                            visibleCount++;
                        } else {
                            item.style.display = 'none';
                        }
                    });

                    // Handle Empty State (Optional)
                    let emptyMsg = document.getElementById('blogEmpty');
                    if (!emptyMsg) {
                        emptyMsg = document.createElement('div');
                        emptyMsg.id = 'blogEmpty';
                        emptyMsg.className = 'blog-empty';
                        emptyMsg.innerHTML = '<h3>記事がありません</h3>';
                        emptyMsg.style.textAlign = 'center';
                        emptyMsg.style.padding = '40px';
                        emptyMsg.style.gridColumn = '1 / -1';
                        grid.appendChild(emptyMsg);
                    }
                    emptyMsg.style.display = visibleCount === 0 ? 'block' : 'none';
                });
            });

            // 4. Fade-in Observer Re-init
            const fadeEls = document.querySelectorAll('.fade-in');
            const ob = new IntersectionObserver(entries => {
                entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('is-visible'); ob.unobserve(e.target); } });
            }, { threshold: 0.1 });
            fadeEls.forEach(el => ob.observe(el));

            // 5. Modal Logic for Dynamic Posts
            window.openPost = function (id) {
                const post = getPosts().find(p => p.id === id);
                if (!post) return;

                const modal = document.getElementById('blogModal');
                const content = document.getElementById('blogModalContent');
                content.innerHTML = `
                    <h2>${post.title}</h2>
                    <div class="blog-card-meta">
                        <span class="blog-card-date">${post.date}</span>
                        <span class="blog-card-category" style="background:var(--color-navy);color:#fff;">活動報告</span>
                    </div>
                    ${post.image ? `<img src="${post.image}" alt="${post.title}" style="max-width:100%;border-radius:8px;margin-bottom:24px;">` : ''}
                    <div class="blog-modal-content" style="line-height:2;">${post.content}</div>
                `;
                modal.classList.add('is-open');
                document.body.style.overflow = 'hidden';
            };

            const modal = document.getElementById('blogModal');
            if (modal) {
                modal.addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
            }
            const modalClose = document.getElementById('blogModalClose');
            if (modalClose) {
                modalClose.addEventListener('click', closeModal);
            }

            function closeModal() {
                if (modal) modal.classList.remove('is-open');
                document.body.style.overflow = '';
            }

            // 6. Mobile Menu Re-init
            const menuToggle = document.getElementById('menuToggle');
            const headerNav = document.getElementById('headerNav');
            const siteHeader = document.getElementById('header');

            if (menuToggle && headerNav) {
                menuToggle.addEventListener('click', () => {
                    headerNav.classList.toggle('is-open');
                    menuToggle.classList.toggle('is-active');
                    if (siteHeader) siteHeader.classList.toggle('menu-open');
                    document.body.style.overflow = headerNav.classList.contains('is-open') ? 'hidden' : '';
                });
            }
        });
    </script>
