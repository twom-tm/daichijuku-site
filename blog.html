<html lang="ja">

<head>

    <style>
        /* Blog-specific styles */
        .blog-hero {
            padding: 140px 0 60px;
            background: var(--color-bg);
            text-align: center;
        }

        .blog-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 28px;
            padding: 80px 0;
        }

        .blog-card {
            background: var(--color-white);
            border: 1px solid var(--color-border-light);
            border-radius: var(--radius-md);
            overflow: hidden;
            transition: all var(--duration) var(--ease);
            cursor: pointer;
        }

        .blog-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        /* Add version to CSS loading in html files to prevent cache issues */
        /* This is a comment indicating styles logic - version 3 */
        .blog-card-image {
            width: 100%;
            height: 180px;
            background: var(--color-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-text-light);
            font-size: 0.8rem;
            overflow: hidden;
        }

        .blog-card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .blog-card-body {
            padding: 24px;
        }

        .blog-card-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .blog-card-date {
            font-family: var(--font-en);
            font-size: 0.75rem;
            color: var(--color-text-light);
        }

        .blog-card-category {
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--color-accent);
            background: var(--color-accent-light);
            padding: 2px 10px;
            border-radius: 20px;
            letter-spacing: 0.03em;
        }

        .blog-card h3 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--color-navy);
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .blog-card p {
            font-size: 0.85rem;
            color: var(--color-text-muted);
            line-height: 1.7;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .blog-empty {
            text-align: center;
            padding: 80px 20px;
            color: var(--color-text-muted);
        }

        .blog-empty svg {
            width: 48px;
            height: 48px;
            color: var(--color-text-light);
            margin-bottom: 16px;
            opacity: 0.4;
        }

        .blog-empty h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--color-navy);
            margin-bottom: 8px;
        }

        .blog-empty p {
            font-size: 0.9rem;
        }

        /* Blog detail modal */
        .blog-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 28, 46, 0.5);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            backdrop-filter: blur(4px);
        }

        .blog-modal-overlay.is-open {
            display: flex;
        }

        .blog-modal {
            background: var(--color-white);
            border-radius: var(--radius-lg);
            max-width: 720px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 48px;
            position: relative;
        }

        .blog-modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            color: var(--color-text-muted);
            transition: color var(--duration) var(--ease);
        }

        .blog-modal-close:hover {
            color: var(--color-navy);
        }

        .blog-modal h2 {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--color-navy);
            line-height: 1.5;
            margin-bottom: 16px;
        }

        .blog-modal-meta {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--color-border-light);
        }

        .blog-modal-content {
            font-size: 0.95rem;
            line-height: 2;
            color: var(--color-text);
        }

        .blog-modal-content p {
            margin-bottom: 20px;
        }

        .blog-modal-content h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--color-navy);
            margin: 32px 0 12px;
        }

        @media (max-width: 768px) {
            .blog-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .blog-modal {
                padding: 32px 24px;
                margin: 20px;
            }
        }

        @media (max-width: 1024px) and (min-width: 769px) {
            .blog-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

    <script>
        // ── Blog rendering from localStorage ──
        const BLOG_KEY = 'daichijuku_blog_posts';

        function getPosts() {
            try {
                return JSON.parse(localStorage.getItem(BLOG_KEY)) || [];
            } catch { return []; }
        }

        function renderBlog() {
            const posts = getPosts().sort((a, b) => new Date(b.date) - new Date(a.date));
            const grid = document.getElementById('blogGrid');
            const empty = document.getElementById('blogEmpty');

            if (posts.length === 0) {
                grid.style.display = 'none';
                empty.style.display = 'block';
                return;
            }

            grid.style.display = '';
            empty.style.display = 'none';
            grid.innerHTML = posts.map((p, i) => `
        <div class="blog-card fade-in${i % 3 === 1 ? ' fade-in-delay-1' : i % 3 === 2 ? ' fade-in-delay-2' : ''}" onclick="openPost('${p.id}')">
          <div class="blog-card-image">
            ${p.image ? `<img src="${p.image}" alt="${p.title}">` : '<span>No Image</span>'}
          </div>
          <div class="blog-card-body">
            <div class="blog-card-meta">
              <span class="blog-card-date">${p.date}</span>
              <span class="blog-card-category">${p.category || '記事'}</span>
            </div>
            <h3>${p.title}</h3>
            <p>${p.excerpt || p.content.replace(/<[^>]*>/g, '').substring(0, 120) + '...'}</p>
          </div>
        </div>
      `).join('');

            // Re-observe fade-in
            document.querySelectorAll('.fade-in:not(.is-visible)').forEach(el => {
                const ob = new IntersectionObserver(entries => {
                    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('is-visible'); ob.unobserve(e.target); } });
                }, { threshold: 0.1 });
                ob.observe(el);
            });
        }

        function openPost(id) {
            const post = getPosts().find(p => p.id === id);
            if (!post) return;

            const modal = document.getElementById('blogModal');
            const content = document.getElementById('blogModalContent');
            content.innerHTML = `
        <h2>${post.title}</h2>
        <div class="blog-modal-meta">
          <span class="blog-card-date">${post.date}</span>
          <span class="blog-card-category">${post.category || '記事'}</span>
        </div>
        <div class="blog-modal-content">${post.content}</div>
      `;
            modal.classList.add('is-open');
            document.body.style.overflow = 'hidden';
        }

        // Close modal
        document.getElementById('blogModal').addEventListener('click', e => {
            if (e.target === e.currentTarget) closeModal();
        });
        document.getElementById('blogModalClose').addEventListener('click', closeModal);

        function closeModal() {
            document.getElementById('blogModal').classList.remove('is-open');
            document.body.style.overflow = '';
        }

        // Mobile menu
        const menuToggle = document.getElementById('menuToggle');
        const headerNav = document.getElementById('headerNav');
        const siteHeader = document.getElementById('header');

        if (menuToggle && headerNav) {
            menuToggle.addEventListener('click', () => {
                headerNav.classList.toggle('is-open');
                const isOpen = headerNav.classList.contains('is-open');
                menuToggle.setAttribute('aria-label', isOpen ? 'メニューを閉じる' : 'メニューを開く');
                // Animate hamburger
                menuToggle.classList.toggle('is-active');

                // Expand header to cover screen and prevent scrolling
                if (siteHeader) {
                    siteHeader.classList.toggle('menu-open', isOpen);
                }
                document.body.style.overflow = isOpen ? 'hidden' : '';
            });

            // Close menu on link click
            headerNav.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', () => {
                    headerNav.classList.remove('is-open');
                    menuToggle.classList.remove('is-active');
                    if (siteHeader) siteHeader.classList.remove('menu-open');
                    document.body.style.overflow = '';
                });
            });
        }

        // Header scroll
        window.addEventListener('scroll', () => {
            document.getElementById('header').classList.toggle('is-scrolled', window.scrollY > 20);
        }, { passive: true });

        renderBlog();
    </script>
